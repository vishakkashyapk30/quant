name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: release
            sanitize: none
            build_type: Release
          - name: asan-ubsan
            sanitize: address
            build_type: Debug
          - name: tsan
            sanitize: thread
            build_type: Debug
    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install liburing
        run: sudo apt-get update && sudo apt-get install -y liburing-dev

      - name: Configure
        run: >
          cmake -S . -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DLAB_SANITIZE=${{ matrix.sanitize }}

      - name: Build
        run: cmake --build build -j"$(nproc)"

      - name: Test
        run: ctest --test-dir build --output-on-failure -j"$(nproc)"
